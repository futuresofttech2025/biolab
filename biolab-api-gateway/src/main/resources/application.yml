# ════════════════════════════════════════════════════════════════════════
# BioLab API Gateway — application.yml
#
# SECURITY POSTURE BY PROFILE
# ─────────────────────────────────────────────────────────────────────
# default (local dev): safe fallbacks allow the gateway to start without
#   any environment variables set. Useful for IDE / mvn spring-boot:run.
#
# prod: ALL fallbacks removed. The gateway fails fast at startup if any
#   required secret is missing. Activate with:
#   SPRING_PROFILES_ACTIVE=prod
#
# KEY VARIABLES
# ─────────────────────────────────────────────────────────────────────
# JWT_SECRET             openssl rand -base64 32
# GATEWAY_INTERNAL_TOKEN openssl rand -base64 32
# REDIS_PASSWORD         openssl rand -base64 16
# ════════════════════════════════════════════════════════════════════════

server:
  port: 8080
  shutdown: graceful
  netty:
    connection-timeout: 10000

spring:
  application:
    name: biolab-api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s

  config:
    import: optional:configserver:http://${CONFIG_HOST:localhost}:${CONFIG_PORT:8888}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

  cloud:
    gateway:
      server:
        webflux:
          trusted-proxies: ".*"
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          httpclient:
            connect-timeout: 5000
            response-timeout: 10s
          default-filters:
            - name: RequestSize
              args:
                maxSize: 100MB

# ─── App configuration (default / local-dev profile) ─────────────────
app:
  jwt:
    # GAP-01: Sprint 0 removed the hardcoded default from source control.
    # For local dev without .env, provide a safe non-production fallback here.
    # In production use SPRING_PROFILES_ACTIVE=prod — that profile has NO fallback.
    secret: ${JWT_SECRET:LocalDevSecretKey-Replace-Before-Any-Deployment-32chars!}
    issuer: biolab-auth-service
    refresh-token-expiration-ms: 604800000
    refresh-token-cookie-name: ${RT_COOKIE_NAME:biolab_rt}

  gateway:
    # Empty default — GatewayTokenFilter skips the header when blank (local dev safe).
    # Production: set GATEWAY_INTERNAL_TOKEN via env or secrets manager.
    internal-token: ${GATEWAY_INTERNAL_TOKEN:}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    # Sprint 2 GAP-14: explicit list — no wildcard
    allowed-headers: "Content-Type,Authorization,X-Request-ID,Accept,Cache-Control"
    allow-credentials: true
    max-age: 3600

  rate-limit:
    default-replenish-rate: 20
    default-burst-capacity: 40
    mfa-replenish-rate: 1
    mfa-burst-capacity: 5

# ─── Eureka ───────────────────────────────────────────────────────────
eureka:
  instance:
    prefer-ip-address: false
    hostname: localhost
    ip-address: 127.0.0.1
    metadata-map:
      zone: primary
      version: 1.0.0
  client:
    service-url:
      defaultZone: http://${APP_EUREKA_USERNAME:admin}:${APP_EUREKA_PASSWORD:admin}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true

# ─── Resilience4j ─────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
    instances:
      authServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
      userServiceCB:
        base-config: default
      catalogServiceCB:
        base-config: default
      projectServiceCB:
        base-config: default
      documentServiceCB:
        base-config: default
      invoiceServiceCB:
        base-config: default
      messagingServiceCB:
        base-config: default
      notificationServiceCB:
        base-config: default
      auditServiceCB:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 4s
    instances:
      authServiceCB:
        timeout-duration: 15s

# ─── Actuator ─────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      access: unrestricted

# ─── Swagger ──────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ─── Logging ──────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.biolab.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"

---
# ════════════════════════════════════════════════════════════════════════
# Profile: prod
# ALL fallbacks removed — gateway refuses to start if any secret is missing.
# Activate: SPRING_PROFILES_ACTIVE=prod
# ════════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    gateway:
      server:
        webflux:
          trusted-proxies: "${TRUSTED_PROXY_PATTERN:10\\.0\\.0\\..*}"

logging:
  level:
    root: WARN
    com.biolab.gateway: INFO
    org.springframework.cloud.gateway: WARN

app:
  jwt:
    # NO fallback in prod — fails fast if JWT_SECRET is unset
    secret: ${JWT_SECRET}
    issuer: biolab-auth-service

  gateway:
    # NO fallback in prod — fails fast if GATEWAY_INTERNAL_TOKEN is unset
    internal-token: ${GATEWAY_INTERNAL_TOKEN}

  elk:
    logstash-host: ${LOGSTASH_HOST:logstash}
    logstash-port: ${LOGSTASH_PORT:5000}

---
# ════════════════════════════════════════════════════════════════════════
# Profile: local
# For running WITHOUT Docker — no Redis, Eureka registers but doesn't block startup.
# Activate: add VM option  -Dspring.profiles.active=local
# OR set env variable:     SPRING_PROFILES_ACTIVE=local
# ════════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost
      port: 6379
      password:

eureka:
  client:
    # Still register with Eureka so gateway can discover services
    register-with-eureka: true
    fetch-registry: true
    # Don't fail startup if Eureka is temporarily unavailable
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/

management:
  health:
    redis:
      enabled: false   # Don't fail health check if Redis is not running locally

app:
  rate-limit:
    enabled: false     # Disable Redis-based rate limiting when running without Redis
