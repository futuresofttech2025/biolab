# ════════════════════════════════════════════════════════════════════════════
# pg_hba.conf — BioLab PostgreSQL Host-Based Authentication
#
# Mounted into the container at:
#   /etc/postgresql/pg_hba.conf   (via docker-compose volume)
#
# CONNECTION POLICY:
#   - Unix socket (local):  trust — used by pg_isready health checks inside container
#   - IPv4 hostssl:         scram-sha-256 over SSL — all app connections require SSL
#   - IPv6 hostssl:         scram-sha-256 over SSL
#
# 'hostssl' means the line ONLY matches SSL connections.
# A plain TCP connection (sslmode=disable) to these lines is REJECTED.
# This enforces encryption in transit for all microservice → DB connections.
# ════════════════════════════════════════════════════════════════════════════

# TYPE    DATABASE  USER      ADDRESS          METHOD
# ── Local socket (pg_isready health check, psql inside container) ─────────────
local     all       all                        trust

# ── IPv4 — require SSL ────────────────────────────────────────────────────────
hostssl   all       all       0.0.0.0/0        scram-sha-256

# ── IPv6 — require SSL ────────────────────────────────────────────────────────
hostssl   all       all       ::/0             scram-sha-256
