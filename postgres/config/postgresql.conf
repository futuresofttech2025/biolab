# ════════════════════════════════════════════════════════════════════════════
# postgresql.conf — BioLab PostgreSQL SSL Configuration
#
# Mounted into the container at:
#   /etc/postgresql/postgresql.conf   (via docker-compose volume)
#
# SSL certificate files are expected at:
#   /etc/postgresql/ssl/server.crt
#   /etc/postgresql/ssl/server.key
#   /etc/postgresql/ssl/root.crt
#
# These are generated by: ./generate-postgres-ssl.sh
# ════════════════════════════════════════════════════════════════════════════

# ── SSL ───────────────────────────────────────────────────────────────────────
ssl = on
ssl_cert_file = '/etc/postgresql/ssl/server.crt'
ssl_key_file  = '/etc/postgresql/ssl/server.key'
ssl_ca_file   = '/etc/postgresql/ssl/root.crt'

# Minimum TLS version — disable old insecure versions
ssl_min_protocol_version = 'TLSv1.2'

# Strong cipher suites only (TLS 1.2 fallback; TLS 1.3 selected automatically)
ssl_ciphers = 'HIGH:!aNULL:!MD5:!RC4'

# ── Connection ────────────────────────────────────────────────────────────────
listen_addresses = '*'
max_connections  = 100

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers  = 128MB
work_mem        = 4MB

# ── Logging ───────────────────────────────────────────────────────────────────
log_connections    = on
log_disconnections = on
# Log SSL connection info so you can verify TLS is being used
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
