# ════════════════════════════════════════════════════════════════════════════
# BioLab Logstash Pipeline — Sprint 1 GAP-10
# Authenticates to Elasticsearch using minimal-privilege logstash_writer user.
# ════════════════════════════════════════════════════════════════════════════

input {
  tcp {
    port  => 5000
    codec => json_lines
  }
}

filter {
  # Timestamp normalization
  if [timestamp] {
    date {
      match    => ["timestamp", "ISO8601"]
      target   => "@timestamp"
      timezone => "UTC"
    }
  }

  # Index routing by service name
  if [service_name] {
    mutate {
      add_field => { "[@metadata][index_suffix]" => "%{service_name}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index_suffix]" => "unknown" }
    }
  }

  # Drop noisy health-check logs
  if [message] =~ /GET \/actuator\/health/ {
    drop {}
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    # GAP-10 FIX: Logstash authenticates — was unauthenticated before Sprint 1
    user     => "${ELASTICSEARCH_USERNAME:logstash_writer}"
    password => "${ELASTICSEARCH_PASSWORD}"
    index    => "biolab-%{[@metadata][index_suffix]}-%{+YYYY.MM.dd}"
    # ILM policy for automatic index rotation
    ilm_enabled         => true
    ilm_rollover_alias  => "biolab-logs"
    ilm_policy          => "biolab-logs-policy"
  }
}
