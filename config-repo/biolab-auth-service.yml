# ════════════════════════════════════════════════════════════════════════
# BioLab Auth Service — Config Server YAML
# SPRINT 0: GAP-01 — JWT_SECRET fallback removed.
# ════════════════════════════════════════════════════════════════════════

server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:biolab}?currentSchema=sec_schema
    username: ${DB_USERNAME:biolab}
    # GAP-01 FIX: no default
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: sec_schema
        format_sql: true

app:
  jwt:
    # GAP-01 FIX: NO default — service refuses to start if JWT_SECRET is unset.
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
    issuer: biolab-auth-service

  security:
    bcrypt-strength: 12
    max-login-attempts: 5
    lockout-duration-minutes: 30
    password-history-count: 5
    password-rotation-days: 90
    max-concurrent-sessions: 5
    anomaly-detection-enabled: true
    # BUG-3 FIX: skip-mfa was missing from config; its @Value default is true,
    # which silently bypassed the entire MFA challenge at login for ALL users —
    # even those who had successfully enrolled MFA through Settings.
    # false = enforce MFA at login (production). true = bypass (local dev only).
    skip-mfa: false
    require-email-verification: true

  # GAP-01 FIX: no default for encryption key
  encryption:
    key: ${ENCRYPTION_KEY}
    key-rotation-days: 90

  elk:
    logstash-host: ${LOGSTASH_HOST:logstash}
    logstash-port: ${LOGSTASH_PORT:5000}